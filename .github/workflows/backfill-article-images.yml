name: Backfill Article Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add missing article images
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: npm run add-images

      - name: Check for image changes
        id: git-check
        run: |
          git diff --exit-code _guides/ assets/images/guides/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push missing article images
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _guides/ assets/images/guides/
          git commit -m "Backfill missing article images [automated]"
          git push
